<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GX Light UI Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0d0f14;
      color: #eef7fa;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      grid-template-rows: 124px minmax(0, 1fr) 28px;
    }
    .side {
      grid-row: 1 / 4;
      background: #11131b;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .top {
      background: #1f212a;
      padding: 6px 10px 7px 8px;
      display: grid;
      grid-template-rows: 34px 42px 1fr;
      gap: 0;
    }
    .tabs {
      display: flex;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
    }
    .tab, .btn {
      border: 1px solid #484d5c;
      background: #252833;
      color: #eef7fa;
      border-radius: 8px;
      min-height: 28px;
      padding: 0 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 38px;
      max-width: 190px;
      flex: 1 1 190px;
    }
    .tab .close {
      color: #a1b0be;
      font-weight: 900;
      padding: 0 2px;
    }
    .tab.island::before {
      content: "";
      width: 5px;
      align-self: stretch;
      border-radius: 999px;
      background: #ff9f43;
    }
    .island-bar {
      width: 22px;
      min-width: 22px;
      padding: 0;
      border: 1px solid #ff9f43;
      background: #252833;
      border-radius: 8px;
      position: relative;
    }
    .island-bar::before {
      content: "";
      position: absolute;
      width: 5px;
      top: 5px;
      bottom: 5px;
      left: 8px;
      background: #ff9f43;
    }
    .favicon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #ff334f;
      flex: 0 0 auto;
    }
    .tabs.dense .tab { padding: 0 6px; }
    .tabs.dense .tab span:not(.favicon) { display: none; }
    .tabs.dense .tab .favicon { display: block; margin: auto; }
    .tab.active { background: #353a49; border-color: #63e8ff; }
    .tab.multi-selected { background: #353a49; border: 2px solid #ff6974; position: relative; }
    .tab.multi-selected::after { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #ff6974; position: absolute; right: 4px; top: 3px; }
    .nav {
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .group {
      display: flex;
      gap: 4px;
      min-width: 0;
    }
    .address {
      min-width: 0;
      height: 36px;
      border: 1px solid #464c5c;
      background: #232630;
      color: white;
      padding: 0 12px;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .side .btn { width: 46px; height: 38px; padding: 0; }
    .favorites {
      display: flex;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
      align-items: center;
    }
    .favorite {
      min-height: 24px;
      max-width: 132px;
      padding: 0 10px;
    }
    .compact-label { display: none; }
    .content {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      background: #202329;
    }
    .home {
      width: min(860px, 92%);
    }
    h1 { margin: 0 0 10px; color: #72f5ff; font-size: 44px; letter-spacing: 0; }
    p { color: #a1b0be; margin: 0 0 24px; }
    .status {
      background: #1f212a;
      color: #a1b0be;
      padding: 6px 12px;
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    @media (max-width: 980px) {
      .wide-label { display: none; }
      .compact-label { display: inline; }
      .btn { padding: 0 10px; }
      .nav { grid-template-columns: auto minmax(140px, 1fr) auto; }
    }
    @media (max-width: 820px) {
      .store-btn { display: none; }
      .shell { grid-template-columns: 56px minmax(0, 1fr); }
      .side .btn { width: 40px; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="side">
      <button class="btn shortcut" data-title="YouTube">YT</button>
      <button class="btn shortcut" data-title="Twitch">TW</button>
      <button class="btn shortcut" data-title="Discord">DC</button>
      <button class="btn shortcut" data-title="GitHub">GH</button>
      <button class="btn shortcut" data-title="Chrome Store">CWS</button>
      <button class="btn shortcut" data-title="Opera Addons">OP</button>
    </aside>
    <header class="top">
      <section class="tabs">
        <button class="tab active" data-tab="Google"><span class="favicon" style="background:#4c8bf5"></span><span>Google</span><span class="close">x</span></button>
        <button class="island-bar" title="Isla con 2 pestanas"></button>
        <button class="tab island island-member multi-selected" data-tab="YouTube" hidden><span class="favicon"></span><span>[S] YouTube</span><span class="close">x</span></button>
        <button class="tab island island-member" data-tab="Musica" hidden><span class="favicon" style="background:#8d66ff"></span><span>Musica</span><span class="close">x</span></button>
        <button class="tab" data-tab="Chrome Web Store"><span class="favicon" style="background:#34a853"></span><span>Chrome Web Store</span><span class="close">x</span></button>
        <button class="tab add-tab" style="width:34px">+</button>
      </section>
      <section class="nav">
        <div class="group">
          <button class="btn">&lt;</button>
          <button class="btn">&gt;</button>
          <button class="btn"><span class="wide-label">Reload</span><span class="compact-label">R</span></button>
          <button class="btn">+</button>
        </div>
        <div class="address">https://chromewebstore.google.com/category/extensions?pli=1</div>
        <div class="group">
          <button class="btn memory">412 MB</button>
          <button class="btn">GX 0.8G</button>
          <button class="btn menu-button">Menu</button>
        </div>
      </section>
      <section class="favorites">
        <button class="btn favorite" data-title="YouTube">YouTube</button>
        <button class="btn favorite" data-title="GitHub">GitHub</button>
        <button class="btn favorite" data-title="Chrome Store">Chrome Store</button>
        <button class="btn favorite" data-title="Opera Addons">Opera Addons</button>
        <button class="btn favorite">...</button>
      </section>
    </header>
    <section class="content">
      <div class="home">
        <h1>GX Light</h1>
        <p>Navegacion ligera con bloqueo nativo, extensiones locales y marketplaces visibles.</p>
      </div>
    </section>
    <footer class="status">Bloqueador activo   reglas: 134133   bloqueadas en pestana: 0</footer>
  </main>
  <nav class="menu-preview" hidden>
    <button>New tab <span>Ctrl+T</span></button>
    <button>New tab in tab island <span>Alt+T</span></button>
    <button>New window <span>Ctrl+N</span></button>
    <button>History <span>Ctrl+H</span></button>
    <button>Downloads <span>Ctrl+J</span></button>
    <button>Bookmarks <span>Ctrl+D</span></button>
    <button>Passwords and autofill</button>
    <button>Extensions</button>
    <button>GX Control / limiters</button>
    <button>Memory monitor</button>
  </nav>
  <script>
    const tabs = document.querySelector('.tabs');
    function makeTab(title) {
      const button = document.createElement('button');
      button.className = 'tab';
      button.dataset.tab = title;
      button.innerHTML = `<span class="favicon" style="background:hsl(${title.length * 31 % 360} 70% 55%)"></span><span>${title}</span><span class="close">x</span>`;
      wireTab(button);
      tabs.insertBefore(button, document.querySelector('.add-tab'));
    }
    function wireTab(tab) {
      tab.addEventListener('click', (event) => {
        if (event.target.classList.contains('close')) {
          tab.remove();
          return;
        }
        document.querySelectorAll('.tab').forEach((node) => node.classList.remove('active'));
        tab.classList.add('active');
      });
      tab.addEventListener('auxclick', (event) => {
        if (event.button === 1) tab.remove();
      });
    }
    document.querySelectorAll('.tab[data-tab]').forEach(wireTab);
    document.querySelector('.add-tab').addEventListener('click', () => makeTab('Nueva pestana'));
    document.querySelector('.island-bar').addEventListener('click', (event) => {
      const expanded = event.currentTarget.dataset.expanded === 'true';
      event.currentTarget.dataset.expanded = String(!expanded);
      document.querySelectorAll('.island-member').forEach((tab) => { tab.hidden = expanded; });
    });
    document.querySelectorAll('.shortcut').forEach((button) => {
      button.addEventListener('auxclick', (event) => {
        if (event.button === 1) makeTab(button.dataset.title);
      });
    });
    document.querySelectorAll('.favorite[data-title]').forEach((button) => {
      button.addEventListener('auxclick', (event) => {
        if (event.button === 1) makeTab(button.dataset.title);
      });
    });
    document.querySelector('.menu-button').addEventListener('click', () => {
      const menu = document.querySelector('.menu-preview');
      menu.hidden = !menu.hidden;
    });
  </script>
</body>
</html>
